<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&family=Inter:wght@700;800&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  .og{
    width:1200px;height:630px;position:relative;overflow:hidden;
    font-family:'Heebo','Arial Hebrew',Arial,sans-serif;
    background:
      radial-gradient(620px 520px at 88% -10%, rgba(53,179,164,.30), transparent 60%),
      radial-gradient(560px 480px at 6% 12%, rgba(31,135,123,.22), transparent 58%),
      radial-gradient(720px 620px at 50% 130%, rgba(53,179,164,.14), transparent 60%),
      #0a1312;
    display:flex;align-items:center;
  }
  .txt{flex:1.05;padding:0 64px 0 30px}
  .logo{height:50px;width:auto;display:block;margin-bottom:30px}
  .cashback{display:inline-flex;align-items:center;gap:10px;background:rgba(53,179,164,.14);border:1px solid rgba(53,179,164,.4);color:#74dccd;font-size:24px;font-weight:800;padding:9px 20px;border-radius:100px;margin-bottom:26px}
  h1{color:#fff;font-size:58px;font-weight:900;line-height:1.08;letter-spacing:-1.5px;margin-bottom:22px}
  h1 .g{background:linear-gradient(120deg,#74dccd,#3bb6a7 55%,#229184);-webkit-background-clip:text;background-clip:text;color:transparent}
  .subs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:30px}
  .subs span{background:rgba(255,255,255,.05);border:1px solid rgba(53,179,164,.22);color:#cfe4df;font-size:20px;font-weight:600;padding:8px 16px;border-radius:12px}
  .url{color:#8ba4a0;font-size:22px;font-weight:700;font-family:'Inter',sans-serif;direction:ltr;text-align:right}
  .cards{flex:.95;position:relative;height:100%}
  .cards img{position:absolute;width:430px;height:auto;border-radius:18px;top:50%}
  .cb{transform:translateY(-50%) rotate(-15deg) translate(60px,-20px);filter:drop-shadow(0 30px 55px rgba(0,0,0,.6));z-index:1}
  .cf{transform:translateY(-50%) rotate(-4deg) translate(-40px,30px);filter:drop-shadow(0 44px 74px rgba(0,0,0,.65));z-index:2}
</style>
</head>
<body>
  <div class="og">
    <div class="txt">
      <img class="logo" src="logo-white.png" alt="BitMart" />
      <div class="cashback">💰 עד 10% כסף חזרה</div>
      <h1>כרטיס Visa קריפטו<br /><span class="g">שמשלם בכל מקום בעולם</span></h1>
      <div class="subs">
        <span>אפס דמי ניהול שנתיים</span>
        <span>הנפקה מיידית</span>
        <span>Apple&nbsp;Pay &amp; Google&nbsp;Pay</span>
      </div>
      <div class="url">bitmart-israel.com</div>
    </div>
    <div class="cards">
      <img class="cb" src="card-black.png" alt="" />
      <img class="cf" src="card-silver.png" alt="" />
    </div>
  </div>
</body>
</html>
